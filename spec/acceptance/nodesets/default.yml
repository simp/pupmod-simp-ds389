---
HOSTS:
  el10:
    roles:
    - directory_server
    - default
    - el10
    platform: el-10-x86_64
    box: almalinux/10
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    # There are not currently any el10 images available on google cloud
    # family: almalinux-cloud/almalinux-10
    # gce_machine_type: n1-standard-2
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
  ssh:
    keepalive: true
    keepalive_interval: 10
    keepalive_maxcount: 120
    host_key:
    - ecdsa-sha2-nistp521-cert-v01@openssh.com
    - ecdsa-sha2-nistp384-cert-v01@openssh.com
    - ecdsa-sha2-nistp256-cert-v01@openssh.com
    - ecdsa-sha2-nistp521
    - ecdsa-sha2-nistp384
    - ecdsa-sha2-nistp256
    - ssh-rsa-cert-v01@openssh.com
    - ssh-rsa-cert-v00@openssh.com
    - ssh-rsa
    - rsa-sha2-256
    - rsa-sha2-512
    - ssh-dss
    kex:
    - ecdh-sha2-nistp521
    - ecdh-sha2-nistp384
    - ecdh-sha2-nistp256
    - diffie-hellman-group-exchange-sha256
    - diffie-hellman-group14-sha256
    - diffie-hellman-group14-sha1
    - diffie-hellman-group-exchange-sha1
    - diffie-hellman-group1-sha1
    encryption:
    - aes256-ctr
    - aes192-ctr
    - aes128-ctr
    - aes256-cbc
    - aes192-cbc
    - aes128-cbc
    - rijndael-cbc@lysator.liu.se
    - blowfish-ctr
    - blowfish-cbc
    - cast128-ctr
    - cast128-cbc
    - 3des-ctr
    - 3des-cbc
    - idea-cbc
    - none
    hmac:
    - hmac-sha2-512-etm@openssh.com
    - hmac-sha2-256-etm@openssh.com
    - hmac-sha2-512
    - hmac-sha2-256
    - hmac-sha1
    - hmac-sha2-512-96
    - hmac-sha2-256-96
    - hmac-sha1-96
    - hmac-ripemd160
    - hmac-ripemd160@openssh.com
    - hmac-md5
    - hmac-md5-96
    - none
